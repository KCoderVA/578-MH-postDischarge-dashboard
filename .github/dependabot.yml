version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "automated"
    assignees:
      - "KCoderVA"
    commit-message:
      prefix: "chore(deps):"

  # npm dependencies (if package.json is present)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "automated"
    assignees:
      - "KCoderVA"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5

  # Python dependencies (if requirements.txt is present)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "automated"
    assignees:
      - "KCoderVA"
    commit-message:
      prefix: "chore(deps):"
    open-pull-requests-limit: 5
